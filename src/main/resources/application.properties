spring.datasource.url=jdbc:sqlite:data/securechat.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=8080

# JWT Configuration (Uses Environment Variable with default fallback for dev)
application.security.jwt.secret-key=${SECURECHAT_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# CORS Configuration
application.cors.allowed-origins=${SECURECHAT_CORS_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# Logging (ChatRelayController : paquets CHAT chiffrés dans la console Java / terminal)
logging.level.sn.ism.cdsd=INFO
logging.level.sn.ism.cdsd.api.controller.ChatRelayController=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Disable Thymeleaf cache in dev
spring.thymeleaf.cache=false
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Documentation API (springdoc-openapi) — UI : /swagger-ui.html (redirige vers /swagger-ui/index.html)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.writer-with-default-pretty-printer=true
springdoc.show-actuator=false
